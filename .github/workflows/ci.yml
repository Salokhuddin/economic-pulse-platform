# CI Pipeline — runs on every push and pull request
#
# What this does:
#   1. Checks out your code
#   2. Installs Python and dependencies
#   3. Runs Ruff linter (catches style issues and bugs)
#   4. Runs pytest (runs all tests)
#
# If any step fails, you see a red X on GitHub.
# If everything passes, you see a green checkmark.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check backend/
          ruff format --check backend/

      - name: Run tests
        run: |
          cd backend
          pytest --cov=. --cov-report=term-missing
